<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080"/>
  <title>Live Weather Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      background: transparent;
      overflow: hidden;
    }
    #container {
      position: fixed;
      bottom: 10px;
      left: 10px;
      width: 500px;
      height: 360px;
      display: flex;
      flex-direction: column;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      background-color: rgba(0, 0, 0, 0.6);
      transition: background-color 0.5s ease;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 8px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    #map {
      flex: 1;
      border-bottom: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px 8px 0 0;
    }
    #info {
      padding: 10px 12px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
    }
    #clock {
      position: fixed;
      bottom: 390px;
      left: 10px;
      padding: 8px 14px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background-color: rgba(0, 0, 0, 0.6);
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 24px;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      z-index: 1001;
      transition: background-color 0.5s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 8px rgba(0, 0, 0, 0.3);
    }
    #stormBanner {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background-color: rgba(0, 0, 0, 0.6);
      font-family: Arial, sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
      z-index: 1002;
      transition: background-color 0.5s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 8px rgba(0, 0, 0, 0.3);
    }

    /* ── Compass Overlay ── */
    #compass-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 1920px;
      height: 70px;
      z-index: 2000;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #compass-tape-wrapper {
      width: 900px;
      height: 50px;
      overflow: hidden;
      position: relative;
      background: rgba(0, 0, 0, 0.55);
      border-bottom: 3px solid rgba(255, 255, 255, 0.3);
      border-left: 3px solid rgba(255, 255, 255, 0.15);
      border-right: 3px solid rgba(255, 255, 255, 0.15);
      border-radius: 0 0 10px 10px;
    }
    #compass-tape {
      position: absolute;
      top: 0;
      height: 100%;
      white-space: nowrap;
      display: flex;
      align-items: flex-end;
      transition: transform 0.08s linear;
    }
    .compass-tick {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      width: 15px;
      flex-shrink: 0;
    }
    .compass-tick .label {
      font-family: 'Consolas', 'Courier New', monospace;
      font-weight: bold;
      color: #fff;
      font-size: 16px;
      margin-bottom: 2px;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    .compass-tick .label.cardinal {
      color: #ff4444;
      font-size: 20px;
    }
    .compass-tick .label.intercardinal {
      color: #ffaa00;
      font-size: 17px;
    }
    .compass-tick .tick-line {
      width: 2px;
      background: rgba(255,255,255,0.5);
      height: 10px;
    }
    .compass-tick .tick-line.major {
      height: 18px;
      width: 3px;
      background: rgba(255,255,255,0.9);
    }
    .compass-tick .tick-line.minor {
      height: 6px;
      background: rgba(255,255,255,0.25);
    }
    #compass-center-indicator {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 100%;
      background: #ff4444;
      z-index: 10;
    }
    #compass-center-indicator::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-bottom: 7px solid #ff4444;
    }
    #compass-center-indicator::before {
      content: '';
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 7px solid #ff4444;
    }
    #compass-heading-readout {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      background: rgba(0, 0, 0, 0.65);
      padding: 2px 14px;
      border-radius: 0 0 8px 8px;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
      letter-spacing: 1px;
    }
    #compass-no-sensor {
      display: none;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      color: #ff6666;
      background: rgba(0, 0, 0, 0.65);
      padding: 2px 14px;
      border-radius: 0 0 8px 8px;
      pointer-events: none;
    }

  </style>
</head>
<body>
  <!-- Compass Overlay -->
  <div id="compass-overlay">
    <div id="compass-tape-wrapper">
      <div id="compass-center-indicator"></div>
      <div id="compass-tape"></div>
    </div>
    <div id="compass-heading-readout">---</div>
    <div id="compass-no-sensor">Tap to enable compass</div>
  </div>

  <div id="clock">Loading clock...</div>
  <div id="container">
    <div id="map"></div>
    <div id="info">Loading location info...</div>
  </div>
  <div id="stormBanner">Loading storm report distance...</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let map, marker, radarLayer, wwaLayer, countyLayer, stormReportsLayer = null;
    let wLayer;
    let radarMode = "sr_bref";
    let currentRadarStation = null;

    // storm icons
    const tornadoIcon = L.icon({
      iconUrl: 'https://cdn-icons-png.flaticon.com/512/2557/2557058.png',
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      popupAnchor: [0, -32]
    });
    const hailIcon = L.icon({
      iconUrl: 'https://cdn-icons-png.flaticon.com/512/6157/6157591.png',
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      popupAnchor: [0, -32]
    });
    const windIcon = L.icon({
      iconUrl: 'https://cdn-icons-png.flaticon.com/512/9755/9755253.png',
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      popupAnchor: [0, -32]
    });

    function updateClock() {
      const now = new Date();
      const localTime = now.toLocaleTimeString();
      const utcTime = now.toUTCString().split(" ")[4];
      document.getElementById("clock").textContent = `Local: ${localTime} | UTC: ${utcTime}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function calculateBearing(lat1, lon1, lat2, lon2) {
      const toRad = deg => deg * Math.PI / 180;
      const toDeg = rad => rad * 180 / Math.PI;
      const dLon = toRad(lon2 - lon1);
      const y = Math.sin(dLon) * Math.cos(toRad(lat2));
      const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
      const brng = Math.atan2(y, x);
      const compass = (toDeg(brng) + 360) % 360;
      const dirs = ["N","NE","E","SE","S","SW","W","NW"];
      return dirs[Math.round(compass/45)%8];
    }

    // ------------------ Alert Parsing ------------------
    function getParam(params, key) {
      if (!params) return undefined;
      const v = params[key];
      if (v == null) return undefined;
      return Array.isArray(v) ? v[0] : v;
    }

    function parseNumber(str) {
      if (str == null) return undefined;
      const m = String(str).match(/-?\d+(\.\d+)?/);
      return m ? parseFloat(m[0]) : undefined;
    }

    function capWords(s) {
      return String(s).toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
    }

    function buildTags(alert) {
      const p = alert.properties;
      const params = p.parameters || {};
      const event = p.event || "";
      const pieces = [];

      function getNumber(key) {
        let val = params[key];
        if (!val) return undefined;
        if (Array.isArray(val)) val = val[0];
        if (typeof val === "string") {
          const m = val.match(/-?\d+(\.\d+)?/);
          return m ? parseFloat(m[0]) : undefined;
        }
        if (typeof val === "number") return val;
        return undefined;
      }

      if (/Tornado Warning/i.test(event)) {
        const torDetect = getParam(params, "tornadoDetection") || "";
        if (/OBSERVED/i.test(torDetect)) pieces.push("Confirmed");
        else if (/RADAR/i.test(torDetect)) pieces.push("Radar Indicated");
        const torDamage = getParam(params, "tornadoDamageThreat") || "";
        if (/CONSIDERABLE|CATASTROPHIC/i.test(torDamage)) pieces.push(capWords(torDamage));
      }

      if (/Severe Thunderstorm Warning/i.test(event)) {
        const hailNum = getNumber("maxHailSize") ?? getNumber("hailSize");
        if (hailNum != null) pieces.push(`Hail: ${hailNum.toFixed(2)}"`);
        const windNum = getNumber("windGust") ?? getNumber("maxWindGust");
        if (windNum != null) pieces.push(`Wind: ${Math.round(windNum)} mph`);
        const torDetect = getParam(params, "tornadoDetection") || "";
        if (/POSSIBLE/i.test(torDetect)) pieces.push("<br>Tornado Possible");
        else {
          const txt = [p.headline, p.description, p.instruction].join(" ");
          if (/TORNADO\s+POSSIBLE/i.test(txt)) pieces.push("<br>Tornado Possible");
        }
        const tds = getParam(params, "thunderstormDamageThreat") || "";
        if (/CONSIDERABLE|DESTRUCTIVE/i.test(tds)) pieces.push(`<br>Damage Threat: ${capWords(tds)}`);
      }

      return pieces.length ? ` (${pieces.join(" | ")})` : "";
    }

    function pickPriorityAlert(features) {
      let best = null, bestScore = -1;
      for (const f of features) {
        const ev = f.properties?.event || "";
        let score = 0;
        if (/Tornado Warning/i.test(ev)) score = 4;
        else if (/Severe Thunderstorm Warning/i.test(ev)) score = 3;
        else if (/Tornado Watch/i.test(ev)) score = 2;
        else if (/Severe Thunderstorm Watch/i.test(ev)) score = 1;
        if (score > bestScore) { bestScore = score; best = f; }
      }
      return best;
    }

    // ------------------ Main Weather Info ------------------
    async function getWeatherInfo(lat, lon) {
      const alertsResp = await fetch(`https://api.weather.gov/alerts/active?point=${lat},${lon}`);
      const alertsData = await alertsResp.json();

      let bgColor = "rgba(0, 0, 0, 0.6)";
      let alertText = "No active severe alerts.";

      if (alertsData.features?.length > 0) {
        const selected = pickPriorityAlert(alertsData.features);
        if (selected) {
          const event = selected.properties.event;
          let color = bgColor;
          if (/Tornado Warning/i.test(event)) color = "rgba(255, 0, 255, 0.45)";
          else if (/Severe Thunderstorm Warning/i.test(event)) color = "rgba(255, 165, 0, 0.45)";
          else if (/Tornado Watch/i.test(event)) color = "rgba(255, 255, 0, 0.35)";
          else if (/Severe Thunderstorm Watch/i.test(event)) color = "rgba(255, 182, 193, 0.35)";
          else if (/Flash Flood Warning/i.test(event)) color = "rgba(0, 180, 0, 0.4)";

          const tagStr = buildTags(selected);
          alertText = `${event}<br>${tagStr}`;
          bgColor = color;
        }
      }

      document.getElementById("container").style.backgroundColor = bgColor;
      document.getElementById("clock").style.backgroundColor = bgColor;

      const pointsResp = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
      const pointsData = await pointsResp.json();
      const city = pointsData.properties.relativeLocation.properties.city;
      const state = pointsData.properties.relativeLocation.properties.state;

      const countyUrl = pointsData.properties.county;
      let countyName = "Unknown";
      try {
        const countyResp = await fetch(countyUrl);
        if (countyResp.ok) {
          const countyData = await countyResp.json();
          countyName = countyData.properties.name;
        }
      } catch(e) { console.warn("county fetch error", e); }

      const radarStation = (pointsData.properties.radarStation || "").toLowerCase();
      if (radarStation && radarStation !== currentRadarStation) {
        currentRadarStation = radarStation;
        if (radarLayer) map.removeLayer(radarLayer);
        radarLayer = L.tileLayer.wms(
          `https://opengeo.ncep.noaa.gov/geoserver/${radarStation}/wms`,
          { layers: `${radarStation}_${radarMode}`, format: "image/png", transparent: true, opacity: 0.45, version: "1.3.0" }
        ).addTo(map);
      } else if (radarLayer) {
        radarLayer.setParams({ layers: `${radarStation}_${radarMode}` });
      }

      const cityCoords = pointsData.properties.relativeLocation.geometry.coordinates;
      const distKm = distance(lat, lon, cityCoords[1], cityCoords[0]);
      const distMi = (distKm * 0.621371).toFixed(1);
      const direction = calculateBearing(cityCoords[1], cityCoords[0], lat, lon);

      let alertStyle = "";
      if (/Tornado Warning|Severe Thunderstorm Warning/.test(alertText)) {
        alertStyle = 'font-weight: bold; font-size: 18px;';
      }

      document.getElementById("info").innerHTML = `
        <strong>County:</strong> ${countyName} <br>
        <strong>Nearest City:</strong> ${city}, ${state} <br>
        <strong>Distance/Direction:</strong> ${distMi} mi ${direction} <br>
        <strong style="${alertStyle}">Alert:</strong> <span style="${alertStyle}">${alertText}</span>
      `;
    }

    function distance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI/180;
      const dLon = (lon2 - lon1) * Math.PI/180;
      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ------------------ Storm Reports ------------------
    async function loadStormReports() {
      try {
        const resp = await fetch("https://twodogswx.net/stormreports");
        const geojson = await resp.json();

        if (stormReportsLayer) map.removeLayer(stormReportsLayer);

        stormReportsLayer = L.geoJSON(geojson, {
          pointToLayer: (feature, latlng) => {
            let icon = tornadoIcon;
            const type = feature.properties.event_type;
            if (type === "hail") icon = hailIcon;
            else if (type === "wind") icon = windIcon;

            return L.marker(latlng, { icon }).bindPopup(`
              <strong>${type.toUpperCase()}</strong><br/>
              Time: ${feature.properties.time}<br/>
              Location: ${feature.properties.location}, ${feature.properties.state}<br/>
              Comments: ${feature.properties.comments}
            `);
          }
        }).addTo(map);

        const banner = document.getElementById("stormBanner");
        if (geojson.features.length > 0 && marker) {
          let closest = null, minDist = Infinity;
          const userLat = marker.getLatLng().lat;
          const userLon = marker.getLatLng().lng;

          for (const feature of geojson.features) {
            const lat = feature.geometry.coordinates[1];
            const lon = feature.geometry.coordinates[0];
            const d = distance(userLat, userLon, lat, lon);
            if (d < minDist) { minDist = d; closest = feature; }
          }

          if (closest) {
            const type = closest.properties.event_type;
            const magnitude = closest.properties.size ?? "N/A";
            const distMi = (minDist * 0.621371).toFixed(1);
            const LSR_loc = closest.properties.location ?? "Unknown";
            const LSR_state = closest.properties.state ?? "Unknown";
            let color = "rgba(80, 80, 80, 0.6)";
            if (type === "tornado") color = "rgba(220, 40, 40, 0.5)";
            else if (type === "wind") color = "rgba(40, 100, 220, 0.5)";
            else if (type === "hail") color = "rgba(40, 180, 80, 0.5)";

            banner.style.backgroundColor = color;
            banner.innerHTML = `
              Nearest Storm Report: ${type.toUpperCase()} (mag: ${magnitude})
              at ${Math.round(distMi)} mi away — Near: ${LSR_loc}, ${LSR_state}
            `;
          }
        } else {
          banner.style.backgroundColor = "rgba(80, 80, 80, 0.6)";
          banner.innerHTML = "No reports nearby.";
        }

      } catch (e) {
        console.error("Failed to load storm reports", e);
        const banner = document.getElementById("stormBanner");
        banner.style.backgroundColor = "rgba(80, 80, 80, 0.6)";
        banner.textContent = "No reports nearby.";
      }
    }

    // ------------------ Setup ------------------
    function setup() {
      if (!navigator.geolocation) { alert("Geolocation not supported."); return; }

      async function updatePosition() {
        navigator.geolocation.getCurrentPosition(async pos => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;

          if (!map) {
            map = L.map('map', { zoomControl: false }).setView([lat, lon], 10);

            L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png").addTo(map);

            map.createPane("labelsPane");
            map.getPane("labelsPane").style.zIndex = 700;

            L.tileLayer("https://tiles.stadiamaps.com/tiles/stamen_terrain_lines/{z}/{x}/{y}{r}.png?api_key=93193627-3b89-42b8-b36d-b4f9720a3dac", { pane: "labelsPane" }).addTo(map);
            L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png", { pane: "labelsPane" }).addTo(map);

            map.createPane("warningsPane");
            map.getPane("warningsPane").style.zIndex = 650;

            map.createPane("CarIconPane");
            map.getPane("CarIconPane").style.zIndex = 1650;

            const carIcon = L.icon({
              iconUrl: "https://cdn-icons-png.flaticon.com/512/1680/1680219.png",
              iconSize: [40,40],
              iconAnchor: [20,20]
            });
            marker = L.marker([lat, lon], {icon: carIcon, pane: "CarIconPane"}).addTo(map);

            wLayer = L.tileLayer.wms(
              "https://mapservices.weather.noaa.gov/eventdriven/services/WWA/watch_warn_adv/MapServer/WMSServer",
              { layers: "1", format: "image/png", transparent: true, version: "1.3.0", pane: "warningsPane" }
            ).addTo(map);

            wwaLayer = L.tileLayer.wms(
              "https://mapservices.weather.noaa.gov/eventdriven/services/WWA/watch_warn_adv/MapServer/WMSServer",
              { layers: "0", format: "image/png", transparent: true, version: "1.3.0", opacity: 0.5 }
            ).addTo(map);

            fetch("https://raw.githubusercontent.com/plotly/datasets/master/geojson-counties-fips.json")
              .then(r => r.json())
              .then(countyData => {
                countyLayer = L.geoJSON(countyData, {
                  style: { color: "#8c864f", weight: 1.4, fillOpacity: 0, dashArray: '10, 10' }
                }).addTo(map);
              });
          } else {
            marker.setLatLng([lat, lon]);
            map.setView([lat, lon]);
          }

          await getWeatherInfo(lat, lon);
          await loadStormReports();
        }, console.error, { enableHighAccuracy: true });
      }

      updatePosition();
      setInterval(updatePosition, 60 * 1000);
      setInterval(() => { radarMode = (radarMode === "sr_bref") ? "sr_bvel" : "sr_bref"; }, 1 * 60 * 1000);
      setInterval(() => { if (map) { const current = map.getCenter(); map.setZoom(8); setTimeout(() => map.setView(current, 10), 30 * 1000); }}, 2 * 60 * 1000);

      // Instead of reloading the whole page (which would re-trigger iOS compass
      // permission every time), force radar/WWA tiles to re-fetch fresh data by
      // busting their cache with a timestamp param every 5 minutes.
      setInterval(() => {
        const ts = Date.now();
        if (radarLayer) radarLayer.setParams({ _ts: ts }, true);
        if (wLayer)     wLayer.setParams({ _ts: ts }, true);
        if (wwaLayer)   wwaLayer.setParams({ _ts: ts }, true);
      }, 5 * 60 * 1000);
    }

    setup();

    // ------------------ Compass Heading Overlay ------------------
    // Uses GPS coords.heading from the Geolocation API — no extra permission
    // needed since geolocation is already granted for the map/weather features.
    // Heading reflects direction of travel, which is ideal for a moving vehicle.
    // Shows last known heading when stationary (GPS heading is null at rest).
    (function() {
      const TICK_WIDTH = 15;
      const TOTAL_DEGREES = 360;
      const TAPE_COPIES = 3;

      const cardinals = { 0:'N', 45:'NE', 90:'E', 135:'SE', 180:'S', 225:'SW', 270:'W', 315:'NW' };
      const tape = document.getElementById('compass-tape');
      const wrapper = document.getElementById('compass-tape-wrapper');
      const readout = document.getElementById('compass-heading-readout');
      const noSensor = document.getElementById('compass-no-sensor');

      // Hide the iOS permission prompt — not needed with GPS heading
      const permissionPrompt = document.getElementById('compass-permission-prompt');
      if (permissionPrompt) permissionPrompt.style.display = 'none';

      function buildTape() {
        tape.innerHTML = '';
        for (let copy = 0; copy < TAPE_COPIES; copy++) {
          for (let deg = 0; deg < TOTAL_DEGREES; deg++) {
            const tick = document.createElement('div');
            tick.className = 'compass-tick';
            const labelDiv = document.createElement('div');
            labelDiv.className = 'label';
            const lineDiv = document.createElement('div');
            lineDiv.className = 'tick-line';

            if (cardinals[deg] !== undefined) {
              labelDiv.textContent = cardinals[deg];
              labelDiv.classList.add(deg % 90 === 0 ? 'cardinal' : 'intercardinal');
              lineDiv.classList.add('major');
            } else if (deg % 10 === 0) {
              labelDiv.textContent = deg + '\u00B0';
              lineDiv.classList.add('major');
            } else if (deg % 5 === 0) {
              labelDiv.innerHTML = '&nbsp;';
            } else {
              labelDiv.innerHTML = '&nbsp;';
              lineDiv.classList.add('minor');
            }

            tick.appendChild(labelDiv);
            tick.appendChild(lineDiv);
            tape.appendChild(tick);
          }
        }
      }
      buildTape();

      let lastHeading = null;

      function updateCompassDisplay(heading) {
        lastHeading = heading;
        const wrapperWidth = wrapper.offsetWidth;
        const halfWrapper = wrapperWidth / 2;
        const middleStart = TOTAL_DEGREES * TICK_WIDTH;
        const offset = middleStart + (heading * TICK_WIDTH) - halfWrapper;
        tape.style.transform = `translateX(${-offset}px)`;

        const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
        const dirLabel = dirs[Math.round(heading / 22.5) % 16];
        readout.textContent = `${Math.round(heading)}\u00B0 ${dirLabel}`;
      }

      function onPosition(pos) {
        const h = pos.coords.heading;
        if (typeof h === 'number' && isFinite(h)) {
          // Active heading from GPS — hide any status message
          noSensor.style.display = 'none';
          updateCompassDisplay(h);
        } else if (lastHeading !== null) {
          // Stationary — hold the last known heading, show a subtle indicator
          noSensor.style.display = 'block';
          noSensor.textContent = 'Stationary \u2014 last heading shown';
        }
        // If lastHeading is also null (first fix, no movement yet), show waiting msg
        if (lastHeading === null && (h === null || !isFinite(h))) {
          noSensor.style.display = 'block';
          noSensor.textContent = 'Waiting for GPS heading\u2026';
        }
      }

      function onError(err) {
        noSensor.style.display = 'block';
        noSensor.textContent = 'GPS unavailable';
        console.warn('Compass GPS error:', err);
      }

      // watchPosition gives continuous updates as the device moves —
      // much more responsive than getCurrentPosition polling.
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(onPosition, onError, {
          enableHighAccuracy: true,
          maximumAge: 1000,
          timeout: 10000
        });
      } else {
        noSensor.style.display = 'block';
        noSensor.textContent = 'Geolocation not supported';
      }
    })();
  </script>
</body>
</html>
